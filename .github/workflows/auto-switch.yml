name: Auto Switch 1N Repository

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  switch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write  # ← THIS IS REQUIRED!

    steps:
      - name: Check exam time
        id: exam
        run: |
          HOUR=$(date +%H)
          if [ $HOUR -ge 9 ] && [ $HOUR -lt 12 ]; then
            echo "public=true" >> $GITHUB_OUTPUT
          else
            echo "public=false" >> $GITHUB_OUTPUT
          fi

      - name: Switch this repository
        uses: actions/github-script@v7
        with:
          script: |
            const isPublic = '${{ steps.exam.outputs.public }}' === 'true';
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              private: !isPublic
            });
            console.log(`✅ Repository set to ${isPublic ? 'PUBLIC' : 'PRIVATE'}`);
